[[questions]]
id = "b3c5d7e9-1a2b-4b3c-c271-3e5f7a9b1c3e"
type = "MultipleChoice"
prompt.prompt = "What specific failure mode does the PPO clipped objective prevent, and how does the clip range ε control the trade-off between update size and stability?"
prompt.distractors = [
  "PPO prevents the Q-value overestimation bias that causes DQN to learn overly optimistic value functions; ε controls how aggressively Q-values are clipped to their true range",
  "PPO prevents reward hacking by clipping the reward signal to the range [-ε, +ε], ensuring the policy cannot exploit high-reward states that were not intended by the designer",
  "PPO prevents vanishing gradients in the policy network by clipping the importance ratio; smaller ε forces larger gradients through the policy update, accelerating convergence",
]
answer.answer = "PPO prevents policy collapse: when a single gradient step moves the policy far from the data-collection policy, subsequent rollouts are generated by a qualitatively different policy than the one that produced the training data, invalidating the advantage estimates and potentially causing catastrophic divergence. The clip range ε defines a trust region: importance ratios r_t outside [1-ε, 1+ε] stop contributing gradient, keeping the new policy close to the old one. Smaller ε means more conservative updates (lower risk of collapse but slower learning); larger ε allows more aggressive updates (faster but riskier)."
context = "This is the same problem TRPO solves with a hard KL constraint, but PPO solves it with the much simpler clipping operation. The min(r_t·Â, clip(r_t, 1-ε, 1+ε)·Â) is a pessimistic lower bound: when the ratio is inside [1-ε, 1+ε], the two terms are equal and gradient flows normally. When the ratio is outside, the clipped term is smaller and provides a 'floor' — the update does not get credit for pushing the policy further outside the trust region. ε=0.2 is the standard starting point; ε=0.1 is more conservative."

[[questions]]
id = "d7e9f1a3-2b4c-4d7e-d382-4f6a8b0c2d4f"
type = "MultipleChoice"
prompt.prompt = "PPO reuses each rollout batch for K epochs of gradient updates. What constraint makes this safe, and what would happen if the constraint were removed (K epochs with no clipping)?"
prompt.distractors = [
  "The constraint that makes K epochs safe is gradient clipping — without gradient clipping, multiple epochs on the same data would cause weight explosion",
  "The constraint that makes K epochs safe is advantage normalization — without normalizing advantages to zero mean, the policy would drift monotonically in the direction of high-advantage actions",
  "The constraint that makes K epochs safe is the value function loss term — the critic's loss counteracts the actor's tendency to overfit the batch data, maintaining stability across K epochs",
]
answer.answer = "The clipped objective is the constraint: as K increases, the policy moves further from the collection policy and the importance ratio r_t drifts further from 1. The clip stops the gradient once r_t leaves [1-ε, 1+ε], preventing each epoch from compounding the previous one's update. Without clipping (K epochs of vanilla policy gradient on the same batch), the first epoch would move the policy, the second epoch would treat the moved policy as if it were the collection policy and move it further, and so on — each epoch invalidates the advantage estimates that the previous epoch relied on, causing rapid divergence."
context = "This is the key efficiency gain PPO achieves over REINFORCE. REINFORCE discards each batch after a single gradient step because additional steps would be off-policy. PPO's clipping turns each additional step into a conservative refinement that stays within a trust region around the collection policy. In practice, K=4-10 is the useful range — above K~10 the clip activates so frequently that learning stalls. The combination of K epochs and clipping is what makes PPO more sample-efficient than policy gradient methods while maintaining stability."

[[questions]]
id = "f1a3c5e7-4d6f-4f1a-f493-5e7a9c1d3f5a"
type = "MultipleChoice"
prompt.prompt = "In RLlib's APPO configuration, what do the parameters clip_param, num_sgd_iter, and lambda_ correspond to in the PPO algorithm, and what specific Module 8 concept requires understanding these mappings?"
prompt.distractors = [
  "clip_param is the learning rate decay schedule, num_sgd_iter is the number of parallel rollout workers, and lambda_ is the discount factor for future rewards — these must be understood to configure the Module 8 PettingZoo adapter correctly",
  "clip_param is the KL divergence penalty coefficient in PPO-Penalty mode, num_sgd_iter is the number of target network updates per training step (analogous to DQN), and lambda_ is the entropy coefficient for exploration",
  "clip_param controls the gradient clipping norm, num_sgd_iter is the batch size, and lambda_ is the V-trace importance sampling threshold — these correspond to IMPALA rather than PPO parameters in the APPO configuration",
]
answer.answer = "clip_param is ε in the clipped surrogate objective (the trust region width); num_sgd_iter is K, the number of gradient update epochs per collected batch (PPO's efficiency gain over single-epoch policy gradient); lambda_ is the GAE λ parameter controlling the bias-variance trade-off in advantage estimation (0=single-step TD, 1=full Monte Carlo). Understanding these mappings is required to configure the Module 8 RLlib pipeline for the conjunction-masking game — changing clip_param affects training stability, num_sgd_iter affects sample efficiency, and lambda_ affects the quality of advantage estimates in a sparse-reward SSA environment."
context = "Without understanding PPO, the Module 8 RLlib configuration is a set of opaque hyperparameter names with no intuitive meaning. With PPO, each parameter has a concrete interpretation: clip_param=0.2 means the policy cannot change more than 20% per update; num_sgd_iter=4 means 4 gradient steps per rollout batch; lambda_=0.95 means advantage estimates are primarily TD-based (low variance) with modest Monte Carlo correction. The APPO adds V-trace on top of PPO to handle the off-policy bias from asynchronous rollout workers — the combination is described in Lesson 8 (IMPALA) using this lesson's PPO foundation."
