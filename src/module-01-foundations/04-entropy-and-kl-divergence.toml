[[questions]]
id = "e1e6a08c-ed5c-5338-aa6b-00bcfff2e10e"
type = "MultipleChoice"
prompt.prompt = "Which distribution over 4 outcomes has the highest entropy?"
prompt.distractors = [
  "[1.0, 0.0, 0.0, 0.0]",
  "[0.7, 0.1, 0.1, 0.1]",
  "[0.5, 0.5, 0.0, 0.0]",
]
answer.answer = "[0.25, 0.25, 0.25, 0.25]"
context = "The uniform distribution maximizes entropy over a fixed support. Any concentration of probability mass reduces uncertainty (and therefore entropy)."

[[questions]]
id = "ee70a863-d864-533e-b21f-cf6969a14994"
type = "MultipleChoice"
prompt.prompt = "When does KL(P || Q) equal zero?"
prompt.distractors = [
  "When P and Q have the same entropy",
  "When Q is uniform",
  "When P puts probability 1.0 on one outcome",
]
answer.answer = "When P and Q are the same distribution"
context = "KL measures the extra surprise from using Q instead of P. When they're identical, there's no extra surprise. KL is always non-negative and equals zero exactly when the distributions match."

[[questions]]
id = "df79a722-70d6-58f6-8936-0adc11921271"
type = "MultipleChoice"
prompt.prompt = "Why is -log p a natural choice for measuring 'surprise' of an outcome with probability p?"
prompt.distractors = [
  "It's the simplest function that maps probabilities to numbers",
  "It's required by the central limit theorem",
  "It produces values between 0 and 1",
]
answer.answer = "Rare events get higher surprise, certain events get zero surprise, and surprise of independent events adds up"
context = "Logarithms turn multiplication into addition, which gives the additivity property. They diverge near zero, giving high surprise for rare events. And log(1) = 0 means certain events carry no surprise."

[[questions]]
id = "defad83a-8866-5d6c-9903-6bd1f55ba200"
type = "ShortAnswer"
prompt.prompt = "Is KL divergence symmetric? In one sentence, why does this matter?"
answer.answer = "No, KL is asymmetric, and minimizing KL(P||Q) versus KL(Q||P) leads to qualitatively different solutions (mode-covering versus mode-seeking)."
context = "Because KL is not a true distance, the choice of which argument is 'truth' affects what the optimizer ends up doing. This shows up concretely in variational inference and in RL policy constraint methods."

[[questions]]
id = "d1ee9d18-bf49-5113-869b-4913f30dd278"
type = "ShortAnswer"
prompt.prompt = """
What does this print (rounded to 4 decimals)?

```python
import torch
from torch.distributions import Categorical
P = Categorical(probs=torch.tensor([0.5, 0.5]))
print(P.entropy().item())
```
"""
answer.answer = "0.6931"
answer.alternatives = ["log 2", "ln 2", "0.69", "0.693"]
context = "Entropy of a fair coin is -2 * (0.5 * log 0.5) = -log 0.5 = log 2 ≈ 0.6931 (in nats). This is the maximum entropy for a 2-outcome distribution."

