id = "1750ab84-cd87-566a-8fb3-b3536c6a668d"
type = "ShortAnswer"
prompt.prompt = "In a policy gradient method that adds an 'entropy bonus' to the loss, what is the entropy bonus encouraging?"
answer.answer = "Exploration: keeping the policy distribution more spread out so it doesn't commit too quickly to one action."
context = "Without entropy regularization, policies often collapse onto a single action early in training, before they've explored enough to know whether that action is actually good."
