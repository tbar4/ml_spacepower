[[questions]]
id = "f1c3e7a9-2b4d-4f8c-d394-7a9b1c3e5f7a"
type = "MultipleChoice"
prompt.prompt = "A state uses a ground-based high-power laser to permanently damage the optical sensor on an adversary's reconnaissance satellite. No debris is created. How does this classify in the counterspace taxonomy?"
prompt.distractors = [
  "Kinetic reversible — lasers are an energy weapon and the satellite continues to orbit",
  "Non-kinetic reversible — the satellite is otherwise functional and might be repaired with a future on-orbit servicing mission",
  "Kinetic irreversible — the laser physically interacts with the satellite's hardware",
]
answer.answer = "Non-kinetic irreversible — the attack does not involve physical collision or debris generation (non-kinetic), but the sensor damage is permanent without hardware replacement (irreversible). HPL attacks are particularly dangerous precisely because they fall in this quadrant: they produce no debris, may look like a hardware failure, and cause permanent capability loss"
context = "The taxonomy matters for wargame design because each quadrant carries different escalation implications. Non-kinetic irreversible attacks are attractive to adversaries because they are hard to attribute, create no debris that would anger third parties, and produce permanent effects. A wargame that only models kinetic ASAT misses the most operationally useful counterspace tools."

[[questions]]
id = "d5e7f9b1-3c5a-4e7d-b496-9c1d3e5f7b9c"
type = "MultipleChoice"
prompt.prompt = "The stability-instability paradox, applied to space, predicts which of the following outcomes?"
prompt.distractors = [
  "Strategic stability in space increases overall military stability because neither side can eliminate the other's retaliatory capability",
  "States with robust space architectures are less likely to initiate conflict because they have more to lose",
  "The presence of kinetic ASAT capabilities deters space attacks by raising the cost of escalation",
]
answer.answer = "Robust strategic deterrence (neither side can eliminate the other's space architecture) may increase instability at lower levels by convincing leaders that limited counterspace operations will not trigger strategic retaliation — making limited attacks more likely, not less"
context = "This is the core tension in space deterrence theory. The paradox was first identified in the nuclear domain by Snyder (1965) and applies to space because space attacks exist on a spectrum from jamming (low escalation) to debris-generating ASAT (high escalation). A state confident in its overall deterrence posture may be more willing to conduct limited jamming or spoofing, believing escalation will be contained."

[[questions]]
id = "a9c1e3f5-4d6b-4f9a-c598-1d3e5f7a9b1d"
type = "MultipleChoice"
prompt.prompt = "Krepinevich's distinction between a Military Technical Revolution (MTR) and a Revolution in Military Affairs (RMA) is that:"
prompt.distractors = [
  "An MTR is a change in weapons technology; an RMA is a change in strategic doctrine — an RMA can happen without new technology",
  "An RMA is a larger-scale change than an MTR — an RMA transforms entire armed forces while an MTR affects only specific weapons systems",
  "An MTR originates with commercial technology; an RMA originates with military research and development programs",
]
answer.answer = "An MTR is a new technology that changes what is militarily possible; an RMA is the successful integration of that technology with new doctrine, organization, training, and leadership to create a qualitatively superior fighting force — an MTR is a necessary but not sufficient condition for an RMA"
context = "Brose's argument in The Kill Chain is that the U.S. has had the MTR (precision guidance, space-based ISR, GPS) since the 1991 Gulf War but has failed to execute the RMA — continuing to buy expensive platforms rather than investing in the sensor-shooter networks that convert technological advantage into operational superiority. The SDA ML products in this curriculum are small pieces of the SDA RMA: they convert the MTR (raw orbital data feeds) into decision-relevant intelligence."

[[questions]]
id = "b7d9a1c3-5e7f-4b2d-e849-3f5a7c9b1d3f"
type = "MultipleChoice"
prompt.prompt = "The Viasat KA-SAT hack on February 24, 2022 is strategically significant beyond its direct military effect because:"
prompt.distractors = [
  "It was the first successful cyberattack against a satellite in orbit, establishing that on-orbit systems are vulnerable to cyber intrusion",
  "It permanently disabled Ukraine's military communications, demonstrating that cyber attacks on commercial space are strategically decisive",
  "It violated the Outer Space Treaty's prohibition on attacks against civilian space infrastructure, creating a legal precedent",
]
answer.answer = "It demonstrated that commercial satellite infrastructure used by military customers is a legitimate military target — and that attacks on it produce collateral effects far beyond the intended target (5,800 German wind turbines lost communications), making the civilian-military boundary in space operationally meaningless in conflict"
context = "The CASR (Commercial Augmentation Space Reserve) framework is the DoD's response to this lesson: establishing contractual frameworks so commercial space capabilities can be integrated into military operations with established protocols. For SDA product developers, the Viasat model means commercial SDA products providing decision-relevant intelligence inherit the targeting profile of the assets they protect."

[[questions]]
id = "d1f3b5e7-7a9c-4d1f-a062-5b7d9f1a3c5e"
type = "MultipleChoice"
prompt.prompt = "The Space Development Agency's Proliferated Warfighter Space Architecture (PWSA) deters adversary attack on U.S. space assets by:"
prompt.distractors = [
  "Deploying satellites with hardened shielding and maneuvering capability that makes individual satellites expensive to destroy",
  "Threatening immediate retaliation against adversary space assets if any U.S. satellite is attacked",
  "Concentrating space capabilities on a small number of highly classified satellites whose location the adversary cannot determine",
]
answer.answer = "Deploying hundreds of small satellites so that attacking one satellite provides negligible capability degradation, while attacking the system meaningfully would require simultaneous kinetic attacks against many satellites — creating Kessler Syndrome consequences the attacker shares and making the cost-benefit calculation for attack strongly negative"
context = "Deterrence by resilience through proliferation is the U.S. alternative to deterrence by punishment (threatening retaliation). The logic is that if the target is hard enough to destroy meaningfully, rational adversaries don't try. This creates the market for SDA ML products: managing a 200+ satellite constellation requires automated anomaly detection and behavioral monitoring that human operators cannot provide at the required scale."
