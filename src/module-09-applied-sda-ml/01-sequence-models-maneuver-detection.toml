[[questions]]
id = "b3f72c91-4d5e-4a8e-9c1f-7e2d06a83b14"
type = "MultipleChoice"
prompt.prompt = "Why are raw element deltas (e.g., Δa between two consecutive TLEs) poor features for maneuver detection?"
prompt.distractors = [
  "Raw deltas contain too much noise from the TLE two-line format and should be smoothed before use",
  "Semi-major axis does not change during maneuvers, so Δa carries no maneuver signal",
  "Raw deltas require knowledge of the object's mass, which is not available in public TLE data",
]
answer.answer = "They are not time-normalized — the same element delta over 6 hours versus 72 hours has completely different physical meaning; always divide by Δt to get a rate"
context = "A Δa of 500 meters over 6 hours implies a significant delta-V (roughly 0.3 m/s). The same 500-meter change over 72 hours is consistent with normal atmospheric drag. Without dividing by Δt, the observation cadence contaminates the feature. TLE publication cadence is irregular enough that this matters on nearly every object in the catalog."

[[questions]]
id = "e91a4f07-2c38-4b61-85d6-3d0c5e8f1a42"
type = "MultipleChoice"
prompt.prompt = "Why is synthetic maneuver injection preferred over collecting real labeled maneuver events for training a TLE-based maneuver detector?"
prompt.distractors = [
  "Synthetic injection produces maneuvers with exactly the delta-V values the model will encounter in deployment, making generalization easier",
  "Space-Track prohibits using its TLE data for machine learning training sets, so real data cannot be used legally",
  "Real maneuver events are too recent to be included in a training set because TLE archives only go back a few years",
]
answer.answer = "Real confirmed maneuver events number in the hundreds at most across the entire public catalog history — far too few to train a generalizable model; synthetic injection provides unlimited positive labels with known ground truth, while the real labeled set is reserved exclusively for test evaluation"
context = "ISS reboosts yield roughly 100-200 documented events across 25 years of operations. DISCOS and academic sources add a few hundred more across the full catalog. This is a training set, not a training dataset. A model trained only on real events will overfit to the specific altitude, inclination, and maneuver-size characteristics of those few objects. Synthetic injection into clean debris histories allows the model to learn the general signature of a maneuver — an anomalous rate change — independent of any specific object."

[[questions]]
id = "7d4b8c52-a1e9-4f73-b0e6-9285d17c0a63"
type = "MultipleChoice"
prompt.prompt = "What makes rocket bodies a problematic object class when training a single maneuver detector alongside active satellites and debris?"
prompt.distractors = [
  "Rocket bodies re-enter the atmosphere too quickly for 30-day windows to capture meaningful TLE history",
  "Rocket bodies are always classified as maneuvering in the Space-Track catalog, making their labels unreliable",
  "Rocket bodies have very low mean motion that causes numerical precision problems in the feature computation",
]
answer.answer = "Rocket bodies have high area-to-mass ratios, causing large solar radiation pressure oscillations in orbital elements that produce element changes similar in magnitude and pattern to propulsive maneuvers; a model trained on mixed object classes will have unacceptably high false positive rates when monitoring rocket bodies"
context = "A rocket body's large cylindrical surface area combined with low structural mass means solar radiation pressure moves it significantly. The resulting oscillations in mean motion, eccentricity, and RAAN residuals mimic the signatures of small maneuvers. Because rocket bodies never actually maneuver, including them as a mixed class creates a training set where 'not a maneuver' includes examples with exactly the feature patterns the model is trying to detect as maneuvers. Either exclude rocket bodies from training entirely, or include them only as a clearly labeled separate class."
