[[questions]]
id = "m04-l04-q01"
type = "MultipleChoice"
prompt.prompt = "What is the source of training data in AlphaZero?"
prompt.distractors = [
  "Human expert games",
  "A separate teacher network trained beforehand",
  "Random play between two random policies",
]
answer.answer = "Self-play games where the current network plays against itself, using MCTS to select moves"
context = "AlphaZero is fully self-supervised. No external data, no expert games, no human knowledge except the rules of the game. The training data is generated by the agent playing itself, with MCTS as the policy improvement operator."

[[questions]]
id = "m04-l04-q02"
type = "MultipleChoice"
prompt.prompt = "What targets does AlphaZero use to train its policy head?"
prompt.distractors = [
  "The network's previous policy outputs",
  "A hand-coded heuristic policy",
  "Random uniform distributions",
]
answer.answer = "The MCTS-improved visit-count distribution at each position from self-play games"
context = "MCTS guided by the network produces a policy that is stronger than the network alone. Training the network's policy to match MCTS's policy makes the next iteration of MCTS even stronger. This is the policy improvement loop at the heart of AlphaZero."

[[questions]]
id = "m04-l04-q03"
type = "MultipleChoice"
prompt.prompt = "What targets does AlphaZero use to train its value head?"
prompt.distractors = [
  "The MCTS rollout returns",
  "Predicted values from a previous network checkpoint",
  "The visit counts at the root of the search",
]
answer.answer = "The actual outcome of the self-play game, propagated back to each position visited"
context = "Each training example records the position and which player was to move. When the game ends, the outcome (+1 for win, -1 for loss, 0 for draw) is assigned to each example with appropriate sign-flipping based on whose turn it was. The value network learns to predict these outcomes."

[[questions]]
id = "m04-l04-q04"
type = "ShortAnswer"
prompt.prompt = "Why does the AlphaZero loop work even though the network starts from random weights?"
answer.answer = "Because MCTS provides policy improvement: even with a poor network, MCTS guided by it explores enough alternatives that the visit counts produce a stronger policy than the network alone. Training on these improved policies bootstraps gradual improvement."
context = "This is the magical property. The network does not need to start out good; it needs to start out non-pathological. MCTS amplifies whatever signal the network has and produces a slightly better policy. Training the network to match that policy makes the next round even better. The improvement compounds."

[[questions]]
id = "m04-l04-q05"
type = "MultipleChoice"
prompt.prompt = "What is the role of temperature in the move-selection step of self-play?"
prompt.distractors = [
  "It controls the learning rate of the network",
  "It determines the discount factor",
  "It scales the value network's output",
]
answer.answer = "It controls how much exploration happens in self-play games. Higher temperature samples more broadly from move distributions, generating diverse training data."
context = "Without temperature > 0 in early moves, all self-play games would be identical (deterministic move selection from the same network). Diverse games are essential for the network to see and learn from a variety of positions. Temperature is typically 1 for the first ~30 moves of each game and drops to 0 (greedy) afterward."

[[questions]]
id = "m04-l04-q06"
type = "ShortAnswer"
prompt.prompt = "How does AlphaZero structurally resemble actor-critic from Module 3?"
answer.answer = "AlphaZero has a single network with a policy head (the actor) and a value head (the critic). Both heads are trained simultaneously: the policy head against MCTS-improved policies, the value head against game outcomes."
context = "The architecture is identical to actor-critic: shared lower layers, separate output heads for policy and value. The training is different (MCTS-improved targets, not policy gradients), but the underlying network design is the same."
